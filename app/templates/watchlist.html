<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloome. - Watchlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            Bloome.
        </div>

        <nav>
            <ul>
                <li>
                    <a href="{{ url_for('routes.dashboard') }}">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('routes.holdings') }}">
                        <i class="fa-solid fa-briefcase"></i>
                        Holdings
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('routes.news') }}">
                        <i class="fa-regular fa-newspaper"></i>
                        News
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('routes.transactions') }}">
                        <i class="fa-solid fa-right-left"></i>
                        Transactions
                    </a>
                </li>

                <li class="active">
                    <a href="{{ url_for('routes.watchlist') }}">
                        <i class="fa-regular fa-star"></i>
                        Watchlist
                    </a>
                </li>

                <li>
                    <a href="{{ url_for('routes.admin') }}">
                        <i class="fa-solid fa-gear"></i>
                        Admin
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Top Bar -->
        <header class="topbar">
            <div></div>

            <div class="user-info">
                <i class="fa-regular fa-user"></i>
                {{ name }}
            </div>
        </header>

        <div class="content">

            <h1>Watchlist</h1>
            <div class="search-bar">
                <input type="text" id="stockSearch" placeholder="Search for ticke ror company" />
                <button onclick="searchStock()">Search</button>
                <p class="watchlist-label">Stocks you're monitoring</p>

<div class="watchlist-list">
    <div class="watchlist-row">
        <div class="watchlist-info">
            <strong>META</strong>
            <span class="company-name">Meta Platforms</span>
        </div>
        <div class="watchlist-right">
            <span>£482.30</span>
            <span class="badge-pos">+1.2%</span>
            <button class="remove-btn">Remove</button>
        </div>
    </div>

    <div class="watchlist-row">
        <div class="watchlist-info">
            <strong>GOOGL</strong>
            <span class="company-name">Alphabet Inc.</span>
        </div>
        <div class="watchlist-right">
            <span>£172.10</span>
            <span class="badge-neg">-0.4%</span>
            <button class="remove-btn">Remove</button>
        </div>
    </div>
</div>
            </div>


        </div>
    </main>

</div>

</body>
</html>
