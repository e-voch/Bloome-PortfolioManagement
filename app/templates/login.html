<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bloome. - Login</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-page">

    <div class="container">
    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="alert alert-{{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h1 class="title">Bloome.</h1>
        <p class="subtitle">Sign in to your account</p>

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email address</label>
            <input type="email" name="email" placeholder="investor@email.com" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" />
        </div>
            <button type="submit" class="btn-add">Sign in</button>
        </form>

      <p class="signup">
        Don’t have an account? <a href="/signup">Create one</a>
      </p>

      <p class="note">Email verification required on first sign up</p>
    </div>
  </div>

</body>
</html>
